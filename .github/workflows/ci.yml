name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (dotnet test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Target the test project directly — it references HoneyDo.csproj transitively,
      # so this covers the whole backend. Avoids HoneyDo.slnx, which registers the
      # frontend folder as a legacy "Website" project that only builds on Windows
      # .NET Framework MSBuild.
      - name: Restore
        run: dotnet restore HoneyDo.Tests/HoneyDo.Tests.csproj

      - name: Build
        run: dotnet build HoneyDo.Tests/HoneyDo.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test HoneyDo.Tests/HoneyDo.Tests.csproj --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"

      # Fails the build if any direct or transitive NuGet package has a known
      # vulnerability. Requires network access to the NuGet vulnerability DB.
      - name: Vulnerability scan (NuGet)
        run: dotnet list HoneyDo.Tests/HoneyDo.Tests.csproj package --vulnerable --include-transitive

  frontend:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: honeydo-client
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: honeydo-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fails on high/critical vulnerabilities. Run after install so the
      # lockfile is authoritative. Use --audit-level=high to avoid noise
      # from low/moderate issues in dev-only tooling.
      - name: Vulnerability scan (npm)
        run: npm audit --audit-level=high

      - name: Test
        run: npm test

      - name: Build (typecheck + bundle)
        run: npm run build
