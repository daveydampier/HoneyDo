server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Avatar uploads ─────────────────────────────────────────────────────
    # Raise the body limit to accommodate the 2 MB avatar upload limit.
    # nginx's default is 1 MB, which would silently reject larger uploads.
    client_max_body_size 5m;

    # ── SPA routing ────────────────────────────────────────────────────────
    # Any path that isn't a real file falls through to index.html so that
    # React Router handles client-side navigation correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ──────────────────────────────────────────────────
    # Requests to /api/* are forwarded to the API container on the internal
    # Docker network.  The browser never talks to the API directly.
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stream request bodies straight through (important for file uploads).
        proxy_request_buffering off;
    }
}
